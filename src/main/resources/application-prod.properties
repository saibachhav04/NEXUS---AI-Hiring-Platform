spring.application.name=nexus-backend
server.port=${PORT:8080}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET:nexus-resumes}

# JWT
jwt.secret=${JWT_SECRET:nexus-super-secret-key-minimum-32-chars}
jwt.expiration-ms=86400000

# Groq AI
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:test@gmail.com}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# AssemblyAI
assemblyai.api.key=${ASSEMBLYAI_KEY:none}

# Frontend
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Disable Redis auto-config if not available
spring.autoconfigure.exclude=